<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Baixe nosso Aplicativo Oficial - Imperdíveis do Dia</title>
  <meta name="description" content="Acesse as melhores promoções da internet direto no seu celular.">

  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #8a2be2;
      --primary-dark: #6a1b9a;
      --bg: #121214;
      --text: #e1e1e6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Partículas de Fundo Estilosas */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(138,43,226,0.3) 0%, rgba(18,18,20,0) 70%);
      top: -100px;
      left: -100px;
      z-index: -1;
      border-radius: 50%;
    }
    
    .bg-glow-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 191, 166, 0.15) 0%, rgba(18,18,20,0) 70%);
      bottom: -50px;
      right: -50px;
      z-index: -1;
      border-radius: 50%;
    }

    .app-icon {
      width: 120px;
      height: 120px;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--primary), #d500f9);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(138, 43, 226, 0.4);
      margin-bottom: 25px;
      font-size: 3rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 15px;
      background: linear-gradient(90deg, #fff, #b3b3b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    p {
      font-size: 1rem;
      color: #a8a8b3;
      margin-bottom: 40px;
      max-width: 400px;
      line-height: 1.5;
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #00e676; /* Verde Google Play */
      color: #000;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 800;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 8px 20px rgba(0, 230, 118, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-download:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 25px rgba(0, 230, 118, 0.4);
    }

    .btn-download:active {
      transform: translateY(1px);
    }

    .play-icon {
      width: 24px;
      height: 24px;
    }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 30px;
      color: #737380;
      font-size: 0.85rem;
    }

    .security-badge svg {
      width: 16px;
      height: 16px;
      stroke: #00e676;
    }
  </style>
</head>
<body>
  
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <!-- Ícone do Aplicativo (Pode ser substituído por uma tag <img> futuramente) -->
  <div class="app-icon">
    🛒
  </div>

  <h1>As Melhores Ofertas Direto no seu Celular</h1>
  <p>Baixe nosso aplicativo oficial e receba notificações exclusivas com cupons de desconto antes de todo mundo.</p>

  <!-- ATENÇÃO MACSSUEL: Cole o link da sua Play Store no "href" abaixo -->
  <a href="https://play.google.com/store/apps/details?id=com.shapepro.fitness" class="btn-download" id="btn-app-download" target="_blank" rel="noopener noreferrer">
    <svg class="play-icon" viewBox="0 0 24 24" fill="#000">
      <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z" />
    </svg>
    BAIXAR NA PLAY STORE
  </a>

  <div class="security-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    App Oficial - 100% Seguro
  </div>

  <script>
    // Rastreamento de clique no botão de download
    document.getElementById('btn-app-download').addEventListener('click', function() {
      // Dispara o evento de Lead/Contato para o Facebook entender que gerou conversão
      if (typeof fbq === 'function') {
        fbq('track', 'Lead', {
          content_name: 'App Download Click'
        });
      }
    });
  </script>
</body>
</html>
